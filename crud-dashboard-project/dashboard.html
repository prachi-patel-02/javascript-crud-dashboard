<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Monoton&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>

<body class="dashboard_page">
    <h1 class="bungee-spice-regular ">welcome</h1>
    <button id="addUserBtn">Add User</button>

    <form id="addUserForm" style="display:none;">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="department" placeholder="Department" required>
        <button type="submit" class="save" id="submitBtn">Save</button>
    </form>

    <table border="1" id="userTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div id="deleteModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">

        <div style="background:white; padding:20px; border-radius:8px; width:300px; text-align:center;">
            <h3>Are you sure?</h3>
            <p>You want to delete this user.</p>
            <button id="confirmDelete" style="background:red; color:white; padding:6px 12px;">Yes</button>
            <button id="cancelDelete" style="padding:6px 12px;">No</button>
        </div>

    </div>
    <script src="./assets/js/dashboard.js">
    </script>
</body>

</html>
